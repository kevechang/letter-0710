      --night: #ffd9e6;
      --paper: #fffafb;
      --ink: #5c2540;
      --ink-deep: #a8325a;
      --gold: #d64569;
      --hand: "MSZ Letter", "Kaiti SC", "STKaiti", cursive;
      --serif: "Serif Letter", "Songti SC", "STSong", serif;
      --latin: "Latin Letter", Georgia, serif;
    }

    * {
      box-sizing: border-box;
    }

    html {
      min-width: 320px;
      background: var(--night);
      scroll-behavior: smooth;
    }

    body {
      min-width: 320px;
      min-height: 100vh;
      min-height: 100svh;
      margin: 0;
      overflow-x: hidden;
      background:
        radial-gradient(circle, rgba(255, 255, 255, .35) 0 3px, transparent 3.2px) 12px 18px / 90px 90px,
        radial-gradient(circle, rgba(255, 255, 255, .25) 0 5px, transparent 5.2px) 64px 72px / 140px 140px,
        linear-gradient(160deg, #ffe9f1, #ffd9e6 55%, #ffcfdf);
      color: var(--ink);
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
    }

    body::before {
      z-index: 20;
      background: radial-gradient(ellipse at center, transparent 44%, rgba(214, 105, 140, .06) 76%, rgba(214, 105, 140, .18) 100%);
    }

    body::after {
      z-index: 19;
      opacity: .05;
      mix-blend-mode: soft-light;
      background-size: 170px 170px;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 180 180' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.82' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.56'/%3E%3C/svg%3E");
    }

    button {
      font: inherit;
    }

    .opening {
      position: fixed;
      z-index: 30;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      transition: opacity .75s ease, visibility .75s ease;
    }

    .opening.is-open {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .envelope-trigger {
      position: relative;
      display: grid;
      justify-items: center;
      gap: 27px;
      padding: 0;
      border: 0;
      color: #d64569;
      background: transparent;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      animation: breathe 3.2s ease-in-out infinite;
    }

    .envelope-trigger:focus-visible {
      outline: 1px solid rgba(232, 66, 90, .62);
      outline-offset: 14px;
      border-radius: 4px;
    }

    .env-kitty {
      position: absolute;
      z-index: 6;
      left: 27%;
      top: 0;
      width: 86px;
      aspect-ratio: 473 / 368;
      background: var(--kitty-peek-img) center / contain no-repeat;
      transform: translate(-50%, -62%) rotate(-2deg);
      pointer-events: none;
      filter: drop-shadow(0 2px 2px rgba(180, 60, 100, .14));
    }

    .envelope {
      position: relative;
      width: min(300px, 78vw);
      aspect-ratio: 1.52;
      overflow: hidden;
      border: 1px solid rgba(232, 66, 90, .4);
      border-radius: 6px;
      background: #fffafc;
      box-shadow:
        0 28px 55px rgba(180, 60, 100, .22),
        0 6px 13px rgba(180, 60, 100, .16),
        inset 0 1px rgba(255, 255, 255, .75);
      transform-origin: 50% 12%;
      transition: transform .72s cubic-bezier(.2, .7, .2, 1), opacity .58s ease;
    }

    .opening.is-open .envelope {
      opacity: 0;
      transform: perspective(700px) rotateX(18deg) translateY(-18px) scale(.94);
    }

    .envelope::before,
    .envelope::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .envelope::before {
      z-index: 1;
      background:
        linear-gradient(32deg, #fff3f7 49.5%, transparent 50%) left bottom / 51% 100% no-repeat,
        linear-gradient(-32deg, #fff3f7 49.5%, transparent 50%) right bottom / 51% 100% no-repeat;
      filter: drop-shadow(0 -1px rgba(232, 66, 90, .18));
    }

    .envelope::after {
      z-index: 2;
      width: 72%;
      height: 104%;
      margin: -54% auto 0;
      border-right: 1px solid rgba(232, 66, 90, .28);
      border-bottom: 1px solid rgba(232, 66, 90, .28);
      background: linear-gradient(135deg, #fffdfd, #ffeef4);
      transform: rotate(45deg);
      transform-origin: center;
      box-shadow: 5px 5px 12px rgba(180, 60, 100, .05);
    }

    .seal {
      position: absolute;
      z-index: 4;
      left: 50%;
      top: 48%;
      display: grid;
      place-items: center;
      width: 58px;
      height: 58px;
      border: 1px solid rgba(152, 25, 57, .62);
      border-radius: 50%;
      background: radial-gradient(circle at 36% 29%, #ff9db8, #e8425a 60%, #c22c48);
      box-shadow:
        0 4px 8px rgba(142, 24, 57, .32),
        inset 0 0 0 3px rgba(255, 220, 230, .16),
        inset 0 -5px 9px rgba(132, 18, 48, .25);
      transform: translate(-50%, -50%) rotate(-6deg);
    }

    .seal-kitty {
      display: block;
      width: 36px;
      aspect-ratio: 478 / 335;
      background: var(--kitty-face-img) center / contain no-repeat;
      filter: drop-shadow(0 1px 1px rgba(126, 20, 46, .2));
    }

    .seal::after {
      content: "";
      position: absolute;
      inset: 5px;
      border: 1px solid rgba(255, 235, 241, .34);
      border-radius: 50%;
    }

    .envelope-bow {
      position: absolute;
      z-index: 3;
      left: 17px;
      bottom: 14px;
      width: 30px;
      height: auto;
      overflow: visible;
      transform: rotate(-14deg);
      filter: drop-shadow(0 2px 2px rgba(180, 60, 100, .16));
    }

    .open-hint {
      padding-left: .16em;
      font-family: var(--hand);
      font-size: 18px;
      letter-spacing: .16em;
      text-shadow: 0 1px 6px rgba(255, 255, 255, .6);
    }

    .kitty-watermarks {
      position: fixed;
      z-index: 1;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
    }

    .kitty-watermark {
      position: absolute;
      width: var(--size);
      aspect-ratio: 478 / 335;
      background: var(--kitty-face-img) center / contain no-repeat;
      opacity: .06;
      transform: rotate(var(--rotate));
    }

    .kitty-watermark:nth-child(even) {
      aspect-ratio: 381 / 440;
      background-image: var(--kitty-sit-img);
      opacity: .055;
    }

    .berry {
      position: absolute;
      width: var(--size, 30px);
      aspect-ratio: 193 / 200;
      background: var(--berry-img) center / contain no-repeat;
      opacity: .16;
      transform: rotate(var(--rotate, 0deg));
    }

    .kitty-watermark:nth-child(1) { left: -38px; top: 7vh; --size: 190px; --rotate: -12deg; }
    .kitty-watermark:nth-child(2) { right: -28px; top: 24vh; --size: 150px; --rotate: 15deg; }
    .kitty-watermark:nth-child(3) { left: -52px; bottom: 4vh; --size: 220px; --rotate: 10deg; }
    .kitty-watermark:nth-child(4) { right: -42px; bottom: 2vh; --size: 178px; --rotate: -9deg; }

    @keyframes breathe {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-7px); }
    }

    .scene {
      position: relative;
      z-index: 2;
      width: 100%;
      min-height: 100vh;
      min-height: 100svh;
      padding: clamp(58px, 9vw, 84px) 0 clamp(76px, 12vw, 130px);
      opacity: 0;
      visibility: hidden;
      transform: translateY(20px) scale(.988);
      transition: opacity 1s ease .18s, transform 1.15s cubic-bezier(.2, .7, .2, 1) .18s, visibility 1s ease;
    }

    .scene.is-visible {
      opacity: 1;
      visibility: visible;
      transform: none;
    }

    .letter-wrap {
      width: min(640px, 92vw);
      margin: 0 auto;
      transform: rotate(-.4deg);
      transform-origin: 50% 10%;
    }

    .letter {
      position: relative;
      min-height: 58vh;
      padding: clamp(42px, 6.4vw, 52px) clamp(22px, 7vw, 54px) clamp(34px, 7vw, 55px);
      overflow: visible;
      border: 1px solid rgba(232, 66, 90, .32);
      border-radius: 8px;
      background:
        repeating-linear-gradient(0deg, rgba(214, 69, 105, .04) 0, rgba(214, 69, 105, .04) 1px, transparent 1px, transparent 5px),
        #fffafb;
      color: var(--ink);
      box-shadow:
        0 36px 72px -30px rgba(180, 60, 100, .78),
        0 16px 30px -18px rgba(180, 60, 100, .58),
        0 2px 4px rgba(180, 60, 100, .22),
        inset 0 0 45px rgba(180, 60, 100, .035);
      isolation: isolate;
      -webkit-tap-highlight-color: transparent;
    }

    .letter::before {
      content: "";
      position: absolute;
      z-index: -1;
      inset: 0;
      opacity: .18;
      background-size: 150px 150px;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 160 160' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='p'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.58' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23p)' opacity='.22'/%3E%3C/svg%3E");
      mix-blend-mode: multiply;
      pointer-events: none;
      border-radius: inherit;
    }

    .paper-kitty {
      position: absolute;
      z-index: 3;
      left: 62%;
      top: 0;
      width: 112px;
      aspect-ratio: 473 / 368;
      background: var(--kitty-peek-img) center / contain no-repeat;
      pointer-events: none;
      transform: translate(-50%, -67%) rotate(1.5deg);
      filter: drop-shadow(0 3px 2px rgba(180, 60, 100, .12));
    }

    .letter-header {
      position: relative;
      padding: 0 74px 18px;
      border-bottom: 1px solid rgba(232, 66, 90, .35);
      text-align: center;
    }

    .letter-kicker {
      display: inline-block;
      padding-left: .34em;
      color: var(--gold);
      font-family: var(--latin);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .34em;
      line-height: 1.5;
      white-space: nowrap;
    }

    .letter-date {
      position: absolute;
      right: 0;
      top: -5px;
      color: #c06080;
      font-family: var(--hand);
      font-size: 15px;
      letter-spacing: .03em;
      transform: rotate(2deg);
    }

    .letter-body {
      margin-top: clamp(27px, 5vw, 39px);
      font-family: var(--hand);
      font-size: 20px;
      line-height: 2.1;
      letter-spacing: .018em;
      text-align: left;
      overflow-wrap: anywhere;
    }

    .paragraph {
      margin: 0;
      white-space: pre-wrap;
    }

    .paragraph:not(:empty) {
      margin-bottom: .9em;
    }

    .paragraph:first-child {
      color: var(--ink-deep);
      font-size: 24px;
      line-height: 1.85;
      text-align: center;
    }

    .ink-caret {
      display: inline-block;
      width: .34em;
      height: .34em;
      margin-left: .08em;
      border-radius: 50% 46% 52% 44%;
      background: #e8425a;
      box-shadow: 0 0 0 1px rgba(194, 44, 72, .14), 0 0 7px rgba(232, 66, 90, .22);
      transform: translateY(.08em) rotate(13deg);
      animation: inkBlink .9s steps(1) infinite;
    }

    @keyframes inkBlink {
      50% { opacity: .15; }
    }

    .letter-sign {
      margin-top: .65em;
      color: #c04a6e;
      font-family: var(--hand);
      font-size: 19px;
      text-align: right;
      opacity: 0;
      transform: translateY(7px);
      transition: opacity .8s ease, transform .8s ease;
    }

    .letter-sign.show {
      opacity: 1;
      transform: none;
    }

    .cake-kitty {
      display: inline-block;
      width: 58px;
      aspect-ratio: 354 / 480;
      background: var(--kitty-cake-img) center / contain no-repeat;
      filter: drop-shadow(0 2px 2px rgba(180, 60, 100, .15));
    }

    .closing-line {
      display: flex;
      align-items: flex-end;
      justify-content: center;
      gap: 12px;
      margin: 20px auto 0;
      padding-left: .28em;
      color: #d64569;
      font-family: var(--serif);
      font-size: 13px;
      font-weight: 500;
      letter-spacing: .28em;
      text-align: center;
      text-shadow: 0 1px 8px rgba(255, 255, 255, .65);
      opacity: 0;
      transform: translateY(7px);
      transition: opacity .9s ease, transform .9s ease;
    }

    .closing-line.show {
      opacity: 1;
      transform: none;
    }

    .petals {
      position: absolute;
      left: 50%;
      bottom: 52px;
      width: min(640px, 92vw);
      height: 180px;
      overflow: hidden;
      pointer-events: none;
      transform: translateX(-50%);
    }

    .petal {
      --x: 50%;
      --drift: 15px;
      --delay: 0s;
      --duration: 7s;
      position: absolute;
      left: var(--x);
      bottom: -20px;
      color: rgba(232, 66, 90, .5);
      font-size: 12px;
      opacity: 0;
      filter: blur(.1px);
    }

    .petals.show .petal {
      animation: petalRise var(--duration) ease-out var(--delay) forwards;
    }

    .petal:nth-child(2n) {
      color: rgba(255, 143, 174, .55);
      font-size: 10px;
    }

    @keyframes petalRise {
      0% { opacity: 0; transform: translate3d(0, 0, 0) rotate(0deg) scale(.82); }
      16% { opacity: .58; }
      72% { opacity: .28; }
      100% { opacity: 0; transform: translate3d(var(--drift), -165px, 0) rotate(95deg) scale(1.05); }
    }

    @media (max-width: 520px) {
      .scene {
        padding-top: 58px;
      }

      .letter {
        padding-top: 43px;
        padding-right: 22px;
        padding-left: 22px;
      }

      .paper-kitty {
        width: 92px;
        transform: translate(-50%, -64%) rotate(1.5deg);
      }

      .kitty-watermark:nth-child(1) { left: -70px; --size: 160px; }
      .kitty-watermark:nth-child(2) { right: -58px; --size: 140px; }
      .kitty-watermark:nth-child(3) { left: -82px; --size: 180px; }
      .kitty-watermark:nth-child(4) { right: -75px; --size: 160px; }

      .letter-header {
        padding: 0 0 18px;
      }

      .letter-kicker {
        font-size: 9.5px;
        letter-spacing: .24em;
      }

      .letter-date {
        position: static;
        display: block;
        margin: 8px 2px -8px 0;
        text-align: right;
      }

      .letter-body {
        font-size: 19px;
        line-height: 2.06;
      }

      .paragraph:first-child {
        font-size: 22px;
      }

      .closing-line {
        margin-top: 21px;
        font-size: 12px;
        letter-spacing: .23em;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      html {
        scroll-behavior: auto;
      }

      *, *::before, *::after {
        animation-duration: .01ms !important;
        animation-iteration-count: 1 !important;
        scroll-behavior: auto !important;
        transition-duration: .01ms !important;
        transition-delay: 0ms !important;
      }
    }
  </style>
</head>
<body>
  <svg width="0" height="0" aria-hidden="true" focusable="false" style="position:absolute;overflow:hidden">
    <defs>
      <symbol id="kitty-bow" viewBox="-42 -20 84 58">
        <g transform="translate(0,0) rotate(22)">
          <path d="M -3 2 Q -32 -16 -37 6 Q -39 25 -7 19 Z" fill="#e8425a" stroke="#1a1a1a" stroke-width="3.5" stroke-linejoin="round"/>
          <path d="M 3 2 Q 32 -16 37 6 Q 39 25 7 19 Z" fill="#e8425a" stroke="#1a1a1a" stroke-width="3.5" stroke-linejoin="round"/>
          <ellipse cx="0" cy="9" rx="10" ry="10.5" fill="#e8425a" stroke="#1a1a1a" stroke-width="3.5"/>
        </g>
      </symbol>
    </defs>
  </svg>

  <div class="kitty-watermarks" aria-hidden="true">
    <div class="kitty-watermark"></div>
    <div class="kitty-watermark"></div>
    <div class="kitty-watermark"></div>
    <div class="kitty-watermark"></div>
    <div class="berry" style="--size:30px;--rotate:-14deg;left:9%;top:36vh"></div>
    <div class="berry" style="--size:24px;--rotate:12deg;right:7%;top:52vh"></div>
    <div class="berry" style="--size:34px;--rotate:8deg;left:14%;bottom:26vh"></div>
    <div class="berry" style="--size:22px;--rotate:-9deg;right:12%;top:12vh"></div>
    <div class="berry" style="--size:26px;--rotate:15deg;right:16%;bottom:9vh"></div>
  </div>

  <div class="opening" id="opening">
    <button class="envelope-trigger" id="openLetter" type="button" aria-label="轻轻拆开生日信">
      <span class="env-kitty" aria-hidden="true"></span>
      <span class="envelope" aria-hidden="true">
        <svg class="envelope-bow" viewBox="-42 -20 84 58"><use href="#kitty-bow"/></svg>
        <span class="seal"><span class="seal-kitty"></span></span>
      </span>
      <span class="open-hint">轻轻拆开</span>
    </button>
  </div>

  <main class="scene" id="scene" aria-hidden="true">
    <div class="letter-wrap">
      <article class="letter" id="letter" aria-label="给豆芽宝宝的生日信">
        <div class="paper-kitty" aria-hidden="true"></div>
        <header class="letter-header">
          <div class="letter-kicker">A LETTER · ONE THOUSAND DAYS</div>
          <time class="letter-date" datetime="2026-07-10">2026.7.10</time>
        </header>
        <div class="letter-body" id="letterBody" aria-live="off"></div>
        <div class="letter-sign" id="letterSign">—— 超爱你的🐷</div>
      </article>
      <div class="closing-line" id="closingLine"><span class="cake-kitty" aria-hidden="true"></span><span>壹仟日 · 生日快乐</span></div>
    </div>

    <div class="petals" id="petals" aria-hidden="true">
      <span class="petal" style="--x:17%;--drift:-18px;--delay:.1s;--duration:6.7s">♥</span>
      <span class="petal" style="--x:31%;--drift:22px;--delay:.7s;--duration:7.5s"><svg width="15" height="11" viewBox="-42 -20 84 58"><use href="#kitty-bow"/></svg></span>
      <span class="petal" style="--x:48%;--drift:-11px;--delay:.35s;--duration:7.1s">♥</span>
      <span class="petal" style="--x:63%;--drift:20px;--delay:1.05s;--duration:6.8s">♥</span>
      <span class="petal" style="--x:76%;--drift:-22px;--delay:.55s;--duration:7.7s"><svg width="13" height="10" viewBox="-42 -20 84 58"><use href="#kitty-bow"/></svg></span>
      <span class="petal" style="--x:88%;--drift:13px;--delay:1.25s;--duration:6.9s">♥</span>
    </div>
  </main>

  <script>
    (() => {
      "use strict";

      const paragraphs = [
        "全世界最宇宙最最最无敌好看的豆芽宝宝！！\n猪生日快乐呀呀！！",
        "小宝和我在一起已经1000天啦，虽然你总是说后悔遇见我，但是你肯定是骗我滴，每次和你待在一起的时候你都会猪猪滴超可爱，你一定是超超喜欢我。",
        "虽然一直说讨厌我，但是小猪对我一直都好好。",
        "我收拾行李的这几天，真的发现现在我的好多东西都是小猪送的耶。",
        "发胶呀，剃须刀呀，各种各样的东西，以后我一定要让乖宝宝超开心，对乖宝宝更更更更好，让这只小猪每天都说喜欢我，每天都黏着我。",
        "其实算下来，我们真的和对方走过了好多好多路，经历了好多好多事啦，从大一的小女孩，到现在小猪已经完成了好多事，无论是打比赛还是实习，或是当了3年的班长，包括之前的运动风采，猪猪真的很厉害，真的比同龄人优秀得多得多，可能小傻宝总是会想到当下的好多烦恼，好多现在自己没做好的事，然后会可能觉得自己不好，但是在我眼中，小傻宝真的真的已经特别特别棒啦，小猪唯一的缺点就是认识不到自己的优点。",
        "一边写这个信，一边想小猪，就好喜欢猪，其实我语文真的不好，好多时候都不知道怎么表达出我有多喜欢你，多想和你一直一直在一起，所以会一直叫你老婆，想把你抱紧紧，想每天都黏着你。",
        "而且三年下来，感觉我们和别的情侣都太不一样了捏，哪怕吃的是同一款饭，都想要夹给对方，也不像一些情侣吃饭各自看着各自的手机，每次都会很想你，和猪猪在一起就是真的真的不会腻，有时候我甚至想就是因为我们天生一对，才不像别人那样，所以哪怕会吵架会有不开心，我们都会一直相互理解，把这些吵架和不愉快好好解决！",
        "虽然这次生日礼物可谓是大大的泄密，一点惊喜都没给小猪，但是等我这头猪想办法赚到钱之后一定会给猪想不到的惊喜，只要看到你开心我就也超开心捏，所以小乖宝要每天多笑多想开心的事情，有不开心的事事情要多和我说道，我来帮小小猪猪想办法呀，不要让不开心的事情影响自己，俺很小疼猪，猪猪要开心我才开心呀。",
        "而且而且，我答应小猪，只要我奖学金下来，就马上带小猪去意大利，带猪玩！！俺肯定会超努力更超努力，以后赚大钱，带乖宝宝去到外玩，让猪猪可以不用上班，天天都可以猪！！",
        "其实我很含蓄的，在信上写，突然会用话说不出来的感觉，但是想到你，又很想很想给猪猪表达出我有多爱你捏。最最最爱的就是你捏，猪猪要答应我不生气闷气，我一定会加倍关心照顾小猪捏，一定要好好和猪猪一直在一起，一直黏你。",
        "说了这么多，我知道我们以后还很大可能遇到一些我们没处理过的困难，但是我们一定会一直在对方身边，一起去克服这些困难，可能会有一些不开心或者说难受的时候，但是只要我们在一起，这些难受就不算什么，不管是只要小猪在身边就不累，相信我，我们很快就会赚到大钱，住大平层养超可爱的猫猫和狗狗，可以每天都抱着一起睡猪觉，可以每天舒舒服服滴不用想太多这这那那滴！！",
        "千言万语说下来，就更要和你一直一直在一起，一直一直让你开开心心，就是特别特别爱你。",
        "最后还是要祝我的猪猪生日快乐呀！以后猪的每次每一个生日，俺都要陪在小猪身边，以后每年都要送猪更多更好的礼物，我一定要让我的猪一直开心一直猪猪滴！！",
        "超超超超爱你！！"
      ];

      const opening = document.getElementById("opening");
      const openButton = document.getElementById("openLetter");
      const scene = document.getElementById("scene");
      const letter = document.getElementById("letter");
      const letterBody = document.getElementById("letterBody");
      const letterSign = document.getElementById("letterSign");
      const closingLine = document.getElementById("closingLine");
      const petals = document.getElementById("petals");
      const reducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
      const punctuation = new Set(["，", "。", "！", "？"]);
      const paragraphNodes = [];
      let paragraphIndex = 0;
      let characterIndex = 0;
      let timer = 0;
      let typing = false;
      let finished = false;
      let opened = false;
      let caret = null;
      let lastScrollAt = 0;

      const createParagraphs = () => {
        paragraphs.forEach(() => {
          const paragraph = document.createElement("p");
          paragraph.className = "paragraph";
          letterBody.appendChild(paragraph);
          paragraphNodes.push(paragraph);
        });
      };

      const placeCaret = (paragraph) => {
        if (!caret) {
          caret = document.createElement("span");
          caret.className = "ink-caret";
          caret.setAttribute("aria-hidden", "true");
        }
        paragraph.appendChild(caret);
      };

      const followWriting = (force = false) => {
        if (!caret) return;
        const now = performance.now();
        if (!force && now - lastScrollAt < 160) return;
        lastScrollAt = now;
        const caretTop = caret.getBoundingClientRect().top;
        const targetTop = window.innerHeight * .67;
        const delta = caretTop - targetTop;
        if (force || Math.abs(delta) > 42) {
          window.scrollBy({ top: delta, behavior: reducedMotion ? "auto" : "smooth" });
        }
      };

      const revealEnding = () => {
        letterSign.classList.add("show");
        window.setTimeout(() => {
          closingLine.classList.add("show");
          petals.classList.add("show");
          followWriting(true);
        }, reducedMotion ? 0 : 1500);
      };

      const completeTyping = () => {
        if (finished) return;
        finished = true;
        typing = false;
        window.clearTimeout(timer);
        if (caret) caret.remove();
        caret = null;
        revealEnding();
      };

      const finishImmediately = () => {
        if (!typing || finished) return;
        paragraphNodes.forEach((paragraph, index) => {
          paragraph.textContent = paragraphs[index];
        });
        paragraphIndex = paragraphs.length;
        completeTyping();
      };

      const typeNext = () => {
        if (!typing || finished) return;

        if (paragraphIndex >= paragraphs.length) {
          completeTyping();
          return;
        }

        const text = paragraphs[paragraphIndex];
        const paragraph = paragraphNodes[paragraphIndex];
        if (characterIndex >= text.length) {
          paragraphIndex += 1;
          characterIndex = 0;
          timer = window.setTimeout(typeNext, 160);
          return;
        }

        const character = text[characterIndex];
        paragraph.appendChild(document.createTextNode(character));
        characterIndex += 1;
        placeCaret(paragraph);
        followWriting();
        timer = window.setTimeout(typeNext, 35 + (punctuation.has(character) ? 180 : 0));
      };

      const showFullLetter = () => {
        paragraphNodes.forEach((paragraph, index) => {
          paragraph.textContent = paragraphs[index];
        });
        paragraphIndex = paragraphs.length;
        characterIndex = 0;
        typing = true;
        completeTyping();
      };

      const beginLetter = () => {
        if (opened) return;
        opened = true;
        opening.classList.add("is-open");
        scene.classList.add("is-visible");
        scene.setAttribute("aria-hidden", "false");
        window.scrollTo({ top: 0, behavior: "auto" });

        window.setTimeout(() => {
          if (reducedMotion) {
            showFullLetter();
          } else {
            typing = true;
            placeCaret(paragraphNodes[0]);
            timer = window.setTimeout(typeNext, 380);
          }
        }, reducedMotion ? 0 : 760);
      };

      createParagraphs();
      openButton.addEventListener("click", beginLetter);
      letter.addEventListener("click", finishImmediately);
      letter.addEventListener("keydown", (event) => {
        if ((event.key === "Enter" || event.key === " ") && typing) {
          event.preventDefault();
          finishImmediately();
        }
      });

      window.__ready = true;
    })();
  </script>
</body>
</html>
